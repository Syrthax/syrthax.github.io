name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Grant GITHUB_TOKEN the permissions required by the Pages actions
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment; cancel in-progress runs if a new
# push lands before the previous deploy finishes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: next-portfolio   # all steps run inside this folder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: next-portfolio/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        run: npx next build
        # next.config.mjs sets output:"export", so `next build` writes to ./out

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: next-portfolio/out   # path is relative to the repo root

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
